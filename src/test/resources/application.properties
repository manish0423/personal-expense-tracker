# ===============================================
# TEST CONFIGURATION - H2 In-Memory Database
# ===============================================
# This configuration OVERRIDES main/resources/application.properties during tests

# Application
spring.application.name=personal-expense-tracker-test
server.port=0

# H2 In-Memory Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (for debugging tests if needed)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT (same as production for consistency)
jwt.secret=mySecretKey1234567890123456789012345678901234567890
jwt.expiration.access=900000
jwt.expiration.refresh=604800000

# Cache
spring.cache.type=simple

# Logging (reduced for cleaner test output)
logging.level.com.jwt.project=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Disable SQL script initialization
spring.sql.init.mode=never