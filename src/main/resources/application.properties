# Application
spring.application.name=personal-expense-tracker
server.port=8080

# Database (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/expense_tracker
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# JWT
jwt.secret=mySecretKey1234567890123456789012345678901234567890
jwt.expiration.access=900000
jwt.expiration.refresh=604800000

# Cache
spring.cache.type=simple

# Logging (optional, for better debugging)
logging.level.com.jwt.project=DEBUG