# 🚀 Simple Maven CI/CD Pipeline for Personal Expense Tracker
name: Build and Test

# When to run this workflow
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ===============================================
  # JOB: BUILD AND TEST
  # ===============================================
  build-and-test:
    name: Build and Test Spring Boot App
    runs-on: ubuntu-latest
    
    steps:
    # STEP 1: Get the code
    - name: Checkout Code
      uses: actions/checkout@v4
      
    # STEP 2: Setup Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    # STEP 3: Cache Maven dependencies
    - name: Cache Maven Dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
        restore-keys: maven-${{ runner.os }}-
        
    # STEP 4: Run tests
    - name: Run Tests
      run: mvn clean test
      
    # STEP 5: Build JAR
    - name: Build JAR
      run: mvn clean package -DskipTests
      
    # STEP 6: Upload JAR as artifact
    - name: Upload JAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: expense-tracker-jar
        path: target/*.jar
        retention-days: 30
        
    # STEP 7: Create GitHub Release (only on main branch)
    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          🚀 Automated release from commit ${{ github.sha }}
          
          **Changes:**
          - Built from latest main branch
          - All tests passed ✅
          
          **Download:**
          - Download the JAR file below
          - Run with: `java -jar personal-expense-tracker-0.0.1-SNAPSHOT.jar`
        files: target/*.jar
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}